spring:
  application:
    name: GATEWAY

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**

            - id: account-service
              uri: lb://ACCOUNT-SERVICE
              predicates:
                - Path=/account/**

            - id: transaction-service
              uri: lb://TRANSACTION-SERVICE
              predicates:
                - Path=/transaction/**

            - id: customer-service
              uri: lb://CUSTOMER-SERVICE
              predicates:
                - Path=/customer/**


jwt:
  secret: ${JWT_SECRET}

server:
  port: 8080

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    preferIpAddress: true
    IpAddress: 127.0.0.1
    instance-id: GATEWAY:${server.port}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG