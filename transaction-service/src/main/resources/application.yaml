spring:
  application:
    name: TRANSACTION-SERVICE
  datasource:
    url: jdbc:mysql://localhost:3306/{DB_NAME}?createDatabaseIfNotExist=true
    username: {DB_USER}
    password: {DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
      hibernate:
        ddl-auto: update

server:
  port: 8084

jwt:
  secret: ${JWT_SECRET}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    preferIpAddress: true
    IpAddress: 127.0.0.1
    instance-id: TRANSACTION-SERVICE:${server.port}
